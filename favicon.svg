<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Document body -->
  <rect x="7" y="5" width="15" height="22" rx="2" fill="white" opacity="0.95"/>
  <!-- Fold corner triangle -->
  <polygon points="18,5 22,5 22,9" fill="#93c5fd"/>
  <polygon points="18,5 22,9 18,9" fill="#bfdbfe"/>
  <!-- Content lines -->
  <rect x="9.5" y="13" width="8" height="1.8" rx="0.9" fill="#2563eb" opacity="0.7"/>
  <rect x="9.5" y="17" width="10" height="1.8" rx="0.9" fill="#2563eb" opacity="0.7"/>
  <rect x="9.5" y="21" width="6" height="1.8" rx="0.9" fill="#2563eb" opacity="0.5"/>
  <!-- "動" label area -->
  <rect x="9.5" y="7" width="7" height="4.5" rx="1" fill="#dbeafe"/>
  <!-- Green checkmark badge bottom-right -->
  <circle cx="24" cy="24" r="6" fill="#16a34a"/>
  <polyline points="21,24 23.2,26.2 27,21.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
